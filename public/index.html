<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash-Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold flex items-center gap-3">Hash-Dashboard <span class="text-yellow-400">• Linux</span></h1>
      <button onclick="showAddModal()" class="px-6 py-3 bg-yellow-400 hover:bg-yellow-300 text-black font-semibold rounded-2xl">+ Add Miner</button>
    </div>

    <div class="flex border-b border-zinc-700 mb-8">
      <button onclick="switchTab(0)" id="tab-monitor" class="tab-button active px-10 py-4 font-semibold text-lg">MONITOR</button>
      <button onclick="switchTab(1)" id="tab-control" class="tab-button px-10 py-4 font-semibold text-lg text-zinc-400">CONTROL</button>
    </div>

    <div id="monitor-tab">
      <div id="fleet" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10"></div>
      <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <div id="control-tab" class="hidden">
      <div id="control-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>
  </div>

  <!-- Donation -->
  <div class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-zinc-900 border border-yellow-400/30 text-yellow-400 text-sm px-6 py-3 rounded-2xl flex items-center gap-3 shadow-2xl">
    ❤️ bc1qntqv9n253pyt0sr4pr7qr7p8vv26n40nav3wa2
  </div>

  <script>
    const socket = io();
    let currentMiners = [];
    let currentStats = {};
    let currentTab = 0;

    function triggerSplash() {
      confetti({ particleCount: 280, spread: 100, origin: { y: 0.6 } });
    }

    function showBlockFound(minerName, hashrate) {
      confetti({ particleCount: 400, spread: 120, origin: { y: 0.6 } });
      const banner = document.createElement('div');
      banner.innerHTML = `<div class="fixed top-12 left-1/2 -translate-x-1/2 bg-gradient-to-r from-yellow-400 to-amber-400 text-black font-bold text-3xl px-16 py-10 rounded-3xl shadow-2xl z-[10000]">
        🎉 BLOCK FOUND! 🎉<br><span class="text-2xl">${minerName} — ${hashrate.toFixed(1)} GH/s</span>
      </div>`;
      document.body.appendChild(banner);
      setTimeout(() => banner.remove(), 7000);
    }

    function formatBestDiff(diff) {
      if (!diff || diff <= 0) return '—';
      if (diff < 1000) return diff.toLocaleString();
      const units = ['K', 'M', 'G', 'T'];
      let value = diff, unitIndex = -1;
      while (value >= 1000 && unitIndex < units.length - 1) {
        value /= 1000; unitIndex++;
      }
      return value.toFixed(unitIndex >= 2 ? 2 : 1) + ' ' + units[unitIndex];
    }

    function renderFleet(stats) {
      let totalH = 0, totalP = 0, online = 0;
      Object.values(stats).forEach(s => {
        if (s.online) {
          totalH += s.hashrate || 0;
          totalP += s.power || 0;
          online++;
        }
      });
      const eff = totalP && totalH ? (totalP / totalH).toFixed(2) : '—';

      document.getElementById('fleet').innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-6">
          <div class="text-yellow-400 text-sm">TOTAL HASHRATE</div>
          <div class="text-5xl font-semibold">${totalH.toFixed(1)} <span class="text-3xl">GH/s</span></div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-6">
          <div class="text-emerald-400 text-sm">ONLINE</div>
          <div class="text-5xl font-semibold">${online} / ${Object.keys(stats).length}</div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-6">
          <div class="text-amber-400 text-sm">TOTAL POWER</div>
          <div class="text-5xl font-semibold">${Math.round(totalP)} <span class="text-3xl">W</span></div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-6">
          <div class="text-sky-400 text-sm">EFFICIENCY</div>
          <div class="text-5xl font-semibold">${eff} <span class="text-3xl">W/TH</span></div>
        </div>
      `;
    }

    function renderGrid(miners, stats) {
      const grid = document.getElementById('grid');
      grid.innerHTML = miners.map(m => {
        const s = stats[m.id] || { online: false };
        const isFallback = s.isUsingFallbackStratum === 1;

        const bestDiffStr = formatBestDiff(s.bestDiff);

        return `
          <div class="card bg-zinc-900 rounded-3xl p-6 border border-zinc-700">
            <div class="flex justify-between items-start">
              <div>
                <div class="font-semibold text-2xl">${m.name}</div>
                <div class="text-zinc-400 text-sm">${m.ip}</div>
              </div>
              <span onclick="deleteMiner('${m.id}')" class="text-red-400 hover:text-red-300 cursor-pointer text-3xl">×</span>
            </div>

            <div class="mt-8 text-7xl font-bold tracking-tighter">
              ${s.online ? s.hashrate.toFixed(1) : '—'} <span class="text-3xl text-zinc-400">GH/s</span>
            </div>

            <div class="grid grid-cols-3 gap-6 mt-10 text-sm">
              <div class="text-center">
                <div class="text-zinc-400 text-xs">TEMP</div>
                <div class="font-medium text-2xl">${s.online ? Number(s.temp).toFixed(1) + '°C' : '—'}</div>
              </div>
              <div class="text-center">
                <div class="text-zinc-400 text-xs">VR TEMP</div>
                <div class="font-medium text-2xl">${s.online ? Number(s.vrTemp).toFixed(1) + '°C' : '—'}</div>
              </div>
              <div class="text-center">
                <div class="text-zinc-400 text-xs">POWER</div>
                <div class="font-medium text-2xl">${s.online ? Math.round(s.power) + 'W' : '—'}</div>
              </div>
            </div>

            <div class="mt-8 text-center text-sm">
              <span class="${isFallback ? 'text-orange-400' : 'text-emerald-400'}">
                ${isFallback ? '🔄 Fallback' : '✅ Primary'} Pool
              </span>
            </div>

            ${bestDiffStr !== '—' ? `
            <div class="mt-6 text-center text-xs text-zinc-400">
              Best Diff: <span class="font-mono text-amber-400">${bestDiffStr}</span>
            </div>` : ''}

            <div class="mt-6 flex justify-between items-center text-sm">
              <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full ${s.online ? 'bg-emerald-400 animate-pulse' : 'bg-red-400'}"></div>
                <span class="${s.online ? 'text-emerald-400' : 'text-red-400'} font-medium">${s.online ? 'ONLINE' : 'OFFLINE'}</span>
              </div>
              <div class="text-zinc-400">${s.efficiency || '—'} W/TH</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Control tab functions (kept minimal)
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('monitor-tab').classList.toggle('hidden', tab !== 0);
      document.getElementById('control-tab').classList.toggle('hidden', tab !== 1);
      document.getElementById('tab-monitor').classList.toggle('active', tab === 0);
      document.getElementById('tab-control').classList.toggle('active', tab === 1);
    }

    async function addMiner() {
      const name = document.getElementById('name').value.trim();
      const ip = document.getElementById('ip').value.trim();
      if (!name || !ip) return alert('Name and IP required');
      await fetch('/api/miners', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name, ip}) });
      hideModal();
    }

    async function deleteMiner(id) {
      if (confirm('Remove this miner?')) {
        await fetch(`/api/miners/${id}`, { method: 'DELETE' });
      }
    }

    function showAddModal() { document.getElementById('modal').classList.remove('hidden'); }
    function hideModal() { document.getElementById('modal').classList.add('hidden'); }

    socket.on('update', ({ miners, stats }) => {
      currentMiners = miners;
      currentStats = stats;
      if (currentTab === 0) {
        renderFleet(stats);
        renderGrid(miners, stats);
      }
    });

    socket.on('blockFound', ({ minerName, hashrate }) => showBlockFound(minerName, hashrate));

    window.onload = () => {
      triggerSplash();
      switchTab(0);
    };
  </script>
</body>
</html>
